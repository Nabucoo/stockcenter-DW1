<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="../styles/colors.css">
    <link rel="stylesheet" href="../styles/estoque.css">
    <title>stockcenter</title>
  </head>
  <body>
    <div id="app">
      <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
          <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center gap-2" href="../../index.html">
              <img src="../assets/logo.png" alt="Logo" width="100">
              <h1>StockCenter</h1>
            </a>

            <button 
              class="navbar-toggler" 
              type="button" 
              data-bs-toggle="collapse" 
              data-bs-target="#navbarNavAltMarkup" 
              aria-controls="navbarNavAltMarkup" 
              aria-expanded="false" 
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
              <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../../index.html">Início</a>
                <a class="nav-link active" aria-current="page" href="./estoque.html">Estoque</a>
                <a class="nav-link" href="./vendas.html">Vendas</a>
                <a class="nav-link" href="./dashboard.html">Dashboard</a>
              </div>
            </div>
          </div>
        </nav>
      </header>

      <main class="estoque-page">
        <h1>Controle de Estoque</h1>

    <div class="toolbar">
        <div class="search-area">
            <input type="text" placeholder="Buscar produto...">
            <button class="btn-search">
                Pesquisar
            </button>
        </div>

        <button class="btn-add" data-bs-toggle="modal" data-bs-target="#modal-adicionar-produto">
            + Adicionar Produto
        </button>
    </div>

    <section class="tabela-container">
        <table class="tabela-produtos">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Categoria</th>
                    <th>Quantidade</th>
                    <th>Preço</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabela">
            </tbody>
        </table>
    </section>

</main>

    <div class="modal fade" id="modal-adicionar-produto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h1 class="modal-title">Adicionar Produto</h1>

                    <button 
                        type="button" 
                        class="btn-close" 
                        data-bs-dismiss="modal" 
                        aria-label="Close">
                    </button>
                </div>

                <div class="modal-body">

                    <form id="form-produto">

                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="nome"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantidade</label>
                            <input 
                                type="number" 
                                class="form-control" 
                                id="quantidade"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Preço de Compra</label>
                            <input 
                                type="number" 
                                step="0.01"
                                class="form-control" 
                                id="preco_compra"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Preço de Venda</label>
                            <input 
                                type="number" 
                                step="0.01"
                                class="form-control" 
                                id="preco_venda"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Caminho</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="caminho"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Departamento</label>

                            <select class="form-select" id="departamento">
                                <option value="Eletrônicos">Bebidas Alcoólicas</option>
                                <option value="Roupas">Refrigerantes</option>
                                <option value="Alimentos">Alimentos</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>

                        <div class="form-check">
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                id="ativo"
                                checked
                            >

                            <label class="form-check-label">
                                Produto Ativo
                            </label>
                        </div>

                    </form>

                </div>

                <div class="modal-footer">
                    <button 
                        type="button" 
                        class="btn-sair" 
                        data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button 
                        type="button" 
                        class="btn-add"
                        onclick="adicionarProduto()">
                        Adicionar produto
                    </button>
                </div>

            </div>
        </div>
    </div> 
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/estoque.js"></script>
  </body>
</html>
