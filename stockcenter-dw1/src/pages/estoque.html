<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="../../node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../styles/colors.css" />
    <link rel="stylesheet" href="../styles/estoque.css" />
    <title>stockcenter</title>
  </head>

  <body>
    <div id="app">
      <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
          <div class="container-fluid">
            <a
              class="navbar-brand d-flex align-items-center gap-2"
              href="../../index.html"
            >
              <img src="../assets/logo.png" alt="Logo" width="100" />
              <h1>StockCenter</h1>
            </a>

            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNavAltMarkup"
              aria-controls="navbarNavAltMarkup"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>

            <div
              class="collapse navbar-collapse"
              id="navbarNavAltMarkup"
            >
              <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../../index.html">Início</a>
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="./estoque.html"
                >
                  Estoque
                </a>
                <a class="nav-link" href="./vendas.html">Vendas</a>
                <a class="nav-link" href="./dashboard.html">Dashboard</a>
              </div>
            </div>
          </div>
        </nav>
      </header>

      <main class="estoque-page">
        <h1>Controle de Estoque</h1>

        <form id="form-buscar-produto">
          <div class="toolbar">
            <div class="search-area">
              <input
                id="nome-buscar"
                name="nome-buscar"
                type="text"
                placeholder="Buscar produto..."
              />

              <button type="submit" class="btn-search">
                Pesquisar
              </button>
          </form>
          </div>

          <button
            type="button"
            class="btn-add"
            data-bs-toggle="modal"
            data-bs-target="#modal-adicionar-produto"
          >
            + Adicionar Produto
          </button>
        </div>

        <section class="cards">
        </section>
      </main>
    </div>

    <!-- Modal Remover Produto -->
    <div
      class="modal fade"
      id="modal-remover-produto"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="form-remover-produto">
            <div class="modal-header">
              <h1 class="modal-title">Remover Produto</h1>

              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>

            <div class="modal-body">
              <div class="mb-3">
                <label>Quantidade:</label>

                <input
                  type="hidden"
                  name="nomeProduto"
                  id="nome-produto"
                />

                <input
                  type="number"
                  id="quantidade-remover"
                  class="form-control"
                  name="quantidadeRemover"
                  required
                />
              </div>
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn-sair"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>

              <button
                type="submit"
                class="btn-sair"
              >
                Remover produto
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal Editar Produto -->
    <div
    class="modal fade"
    id="modal-editar-produto"
    tabindex="-1"
    aria-hidden="true"
    >
        <div class="modal-dialog">
            <div class="modal-content">
            <form id="form-editar-produto">
                <div class="modal-header">
                <h1 class="modal-title">Editar Produto</h1>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                ></button>
                </div>

                <div class="modal-body">

                <input
                    type="hidden"
                    id="nome-produto-editar"
                    name="nomeProduto"
                >

                <div class="mb-3">
                    <label class="form-label" for="novo-nome">
                    Novo Nome
                    </label>

                    <input
                    type="text"
                    class="form-control"
                    id="novo-nome"
                    name="novoNome"
                    required
                    />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="nova-quantidade">
                    Nova Quantidade
                    </label>

                    <input
                    type="number"
                    class="form-control"
                    id="nova-quantidade"
                    name="novaQuantidade"
                    required
                    />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="novo-preco-compra">
                    Novo Preço de Compra
                    </label>

                    <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    id="novo-preco-compra"
                    name="novoPrecoCompra"
                    required
                    />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="novo-preco-venda">
                    Novo Preço de Venda
                    </label>

                    <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    id="novo-preco-venda"
                    name="novoPrecoVenda"
                    required
                    />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="novo-departamento">
                    Novo Departamento
                    </label>

                    <input
                    type="text"
                    class="form-control"
                    id="novo-departamento"
                    name="novoDepartamento"
                    />
                </div>

                <div class="form-check">
                    <input
                    class="form-check-input"
                    type="checkbox"
                    id="novo-ativo"
                    name="novoAtivo"
                    />

                    <label
                    class="form-check-label"
                    for="novo-ativo"
                    >
                    Produto Ativo
                    </label>
                </div>
                </div>

                <div class="modal-footer">
                <button
                    type="button"
                    class="btn-sair"
                    data-bs-dismiss="modal"
                >
                    Cancelar
                </button>

                <button
                    type="submit"
                    class="btn-add"
                >
                    Salvar Alterações
                </button>
                </div>
            </form>
            </div>
        </div>
    </div>

    <!-- Modal Adicionar Produto -->
    <div
      class="modal fade"
      id="modal-adicionar-produto"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="form-adicionar-produto">
            <div class="modal-header">
              <h1 class="modal-title">Adicionar Produto</h1>

              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>

            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label" for="nome">Nome</label>

                <input
                  type="text"
                  class="form-control"
                  id="nome"
                  name="nome"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label" for="quantidade">
                  Quantidade
                </label>

                <input
                  type="number"
                  class="form-control"
                  id="quantidade"
                  name="quantidade"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label" for="preco_compra">
                  Preço de Compra
                </label>

                <input
                  type="number"
                  step="0.01"
                  class="form-control"
                  id="preco_compra"
                  name="preco_compra"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label" for="preco_venda">
                  Preço de Venda
                </label>

                <input
                  type="number"
                  step="0.01"
                  class="form-control"
                  id="preco_venda"
                  name="preco_venda"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label" for="departamento">
                  Departamento
                </label>

                <input
                  type="text"
                  class="form-control"
                  id="departamento"
                  name="departamento"
                />
              </div>

              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="ativo"
                  name="ativo"
                  checked
                />

                <label
                  class="form-check-label"
                  for="ativo"
                >
                  Produto Ativo
                </label>
              </div>
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn-sair"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>

              <button
                type="submit"
                class="btn-add"
              >
                Adicionar produto
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script
      defer
      type="module"
      src="../scripts/estoque/estoque.js"
    ></script>
  </body>
</html>
